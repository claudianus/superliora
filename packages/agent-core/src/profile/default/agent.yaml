name: agent
description: Default SuperLiora agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  # Core coding tools — minimal set required for everyday software engineering.
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  # Lean context tools — kept until merged into Read/Grep advanced modes.
  - LioraRead
  # External information and user clarification.
  - WebSearch
  - FetchURL
  - AskUserQuestion
  # MCP tools are gated separately by the profile.
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
