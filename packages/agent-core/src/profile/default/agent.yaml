name: agent
description: Default SuperLiora agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  # Core coding tools — everyday software engineering.
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  # Lean context tools — kept until merged into Read/Grep advanced modes.
  - LioraRead
  # Progress transparency and long-run autonomy (main agent only).
  - TodoList
  - UltraworkGraph
  - EnterPlanMode
  - NextPhase
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - GetCurrentTime
  # Skills + subagents (catalog still loads on demand).
  - Skill
  - SearchSkill
  - Agent
  - SearchExpert
  - AgentSwarm
  - UltraSwarm
  # External information and user clarification.
  - WebSearch
  - FetchURL
  - Context7Resolve
  - Context7Docs
  - AskUserQuestion
  - Memory
  - TaskList
  - TaskOutput
  - TaskStop
  - ReadMediaFile
  # MCP tools are gated separately by the profile.
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
