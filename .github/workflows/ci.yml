name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:source-install

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  test-windows:
    runs-on: windows-latest
    # Temporarily disabled while Windows tests are being stabilized.
    if: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Windows runners are slower and run the whole suite (including
      # in-process e2e tests) under more contention, so the default 5s test
      # timeout causes flaky failures. Give it more headroom.
      - run: pnpm run test -- --testTimeout=30000

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check:imports
      - run: pnpm run sherif
      - name: Theme contrast check (WCAG AA)
        run: pnpm --filter @superliora/liora run check:contrast

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: |
          pnpm dlx --package @typescript/native-preview@beta tsgo --version
          for config in packages/*/tsconfig.json apps/liora/tsconfig.json; do
            if [ "${config}" = "packages/agent-core/tsconfig.json" ]; then
              continue
            fi
            echo "Typechecking ${config}"
            pnpm dlx --package @typescript/native-preview@beta tsgo -p "${config}" --noEmit
          done
          echo "Typechecking packages/agent-core/tsconfig.src.json"
          pnpm dlx --package @typescript/native-preview@beta tsgo -p packages/agent-core/tsconfig.src.json --noEmit
      - name: Typecheck vis-server
        run: pnpm --filter @superliora/vis-server run typecheck
      - name: Typecheck vis-web
        run: pnpm --filter @superliora/vis-web run typecheck
