name: Deploy Site to GitHub Pages

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm -C apps/site build

      - name: Verify built site
        run: |
          test -f apps/site/dist/index.html
          test -f apps/site/dist/en/index.html
          test -f apps/site/dist/assets/hero-command-center.png

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: apps/site/dist
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://claudianus.github.io/superliora/
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "chore: deploy site to gh-pages"
